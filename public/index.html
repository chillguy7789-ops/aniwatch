<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWACH</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Sora:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #000; --card: #0a0a0a; --accent: #fff; --text: #eee; --dim: #555; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 32px; margin-bottom: 20px; letter-spacing: -1px; color: var(--accent); }
        .container { width: 100%; max-width: 500px; }
        .player-box { background: var(--card); border-radius: 12px; border: 1px solid #1a1a1a; overflow: hidden; margin-bottom: 20px; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; }
        .controls { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .search-row { display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid #222; padding: 12px; border-radius: 8px; color: #fff; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 0 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        #status { font-size: 11px; color: var(--dim); text-align: center; min-height: 15px; }
        .results { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; max-height: 250px; overflow-y: auto; }
        .anime-item { background: #111; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; border: 1px solid #222; }
    </style>
</head>
<body>

    <div class="logo">SWACH</div>

    <div class="container">
        <div class="player-box">
            <div class="video-container"><video id="video" controls playsinline></video></div>
            <div class="controls">
                <div class="search-row">
                    <input type="text" id="query" placeholder="Search Anime...">
                    <button onclick="searchAnime()">FIND</button>
                </div>
                <div id="status">READY</div>
                <div id="results" class="results"></div>
            </div>
        </div>
    </div>

<script>
const API_BASE = "/api/v2/hianime";
const PROXY_URL = "/swach/proxy";

async function searchAnime() {
    const q = document.getElementById('query').value;
    const resDiv = document.getElementById('results');
    const status = document.getElementById('status');
    if (!q) return;
    status.innerText = "🔍 SEARCHING...";
    resDiv.innerHTML = "";
    try {
        const res = await fetch(`${API_BASE}/search?q=${encodeURIComponent(q)}`);
        const json = await res.json();
        json.data.animes.slice(0, 6).forEach(anime => {
            const div = document.createElement('div');
            div.className = 'anime-item';
            div.innerText = anime.name;
            div.onclick = () => getRealEpisodeId(anime.id);
            resDiv.appendChild(div);
        });
        status.innerText = "SELECT AN ANIME";
    } catch (e) { status.innerText = "SEARCH ERROR"; }
}

async function getRealEpisodeId(animeId) {
    const status = document.getElementById('status');
    status.innerText = "🚀 FETCHING EPISODE LIST...";
    try {
        // STEP 1: Get the actual anime info
        const res = await fetch(`${API_BASE}/anime/${animeId}`);
        const json = await res.json();
        
        // Check where the episodes are hiding in your API version
        const episodes = json.data.episodes;
        if (!episodes || episodes.length === 0) throw new Error("No episodes in data");

        // STEP 2: Use the exact ID provided by the API (e.g., "one-piece-episode-1")
        const realId = episodes[0].episodeId;
        playStream(realId);
    } catch (e) {
        status.innerText = "❌ EPISODE LIST FAILED: " + e.message;
        console.error(e);
    }
}

async function playStream(realId) {
    const status = document.getElementById('status');
    status.innerText = "📡 CONNECTING TO STREAM...";
    try {
        // STEP 3: Request sources with the verified ID
        const res = await fetch(`${API_BASE}/episode/sources?animeEpisodeId=${realId}&server=hd-1&category=sub`);
        const json = await res.json();
        
        if (!json.data.sources) throw new Error("No video sources");

        const m3u8 = json.data.sources[0].url;
        const finalLink = `${PROXY_URL}?url=${encodeURIComponent(m3u8)}`;

        const video = document.getElementById('video');
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(finalLink);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
                status.innerText = "🎬 NOW PLAYING";
            });
        } else {
            video.src = finalLink;
            video.play();
        }
    } catch (e) { status.innerText = "❌ STREAM ERROR"; }
}
</script>
</body>
</html>
