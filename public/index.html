<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWACH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&family=Sora:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #000; --card: #0a0a0a; --accent: #ffffff; --text: #eee; --dim: #555; --r: 12px; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 28px; margin-bottom: 20px; letter-spacing: -1px; }
        .container { width: 100%; max-width: 600px; }
        .player-box { background: var(--card); border-radius: var(--r); border: 1px solid #1a1a1a; overflow: hidden; margin-bottom: 20px; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; outline: none; }
        .controls { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .search-row { display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid #222; padding: 12px; border-radius: 8px; color: #fff; font-family: inherit; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 0 20px; border-radius: 8px; font-weight: 700; font-family: 'Outfit'; cursor: pointer; }
        #status { font-size: 11px; color: var(--dim); text-align: center; }
        .results { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .anime-item { background: #111; padding: 10px; border-radius: 6px; font-size: 14px; cursor: pointer; border: 1px solid transparent; }
        .anime-item:hover { border-color: var(--dim); }
    </style>
</head>
<body>

    <div class="logo">SWACH</div>

    <div class="container">
        <div class="player-box">
            <div class="video-container">
                <video id="video" controls playsinline></video>
            </div>
            <div class="controls">
                <div class="search-row">
                    <input type="text" id="query" placeholder="Search anime (e.g. Naruto)">
                    <button onclick="searchAnime()">FIND</button>
                </div>
                <div id="status">Ready to stream</div>
                <div id="results" class="results"></div>
            </div>
        </div>
    </div>

<script>
const API_BASE = window.location.origin + "/api/v2/hianime";
const PROXY_URL = window.location.origin + "/swach/proxy";

async function searchAnime() {
    const q = document.getElementById('query').value;
    const resDiv = document.getElementById('results');
    const status = document.getElementById('status');
    if (!q) return;

    status.innerText = "🔍 Searching...";
    resDiv.innerHTML = "";

    try {
        const res = await fetch(`${API_BASE}/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        
        data.animes.slice(0, 5).forEach(anime => {
            const div = document.createElement('div');
            div.className = 'anime-item';
            div.innerText = anime.name;
            div.onclick = () => getEpisodes(anime.id);
            resDiv.appendChild(div);
        });
        status.innerText = "Select an anime below:";
    } catch (e) {
        status.innerText = "Search Error. Use ID directly.";
    }
}

async function getEpisodes(animeId) {
    const status = document.getElementById('status');
    status.innerText = "🚀 Loading Episode Data...";
    document.getElementById('results').innerHTML = "";

    try {
        // Step 1: Hit the Anime Path (which we know works)
        const res = await fetch(`${API_BASE}/anime/${animeId}`);
        const data = await res.json();
        
        // Step 2: Extract first episode or use the ID to watch
        // We attempt to fetch the source for the episode
        loadVideo(animeId);
    } catch (e) {
        status.innerText = "Error loading episodes.";
    }
}

async function loadVideo(epId) {
    const status = document.getElementById('status');
    const video = document.getElementById('video');
    status.innerText = "📡 Fetching Stream...";

    try {
        // Attempting to find the watchable source
        // Note: Your version likely uses /episode/sources?animeEpisodeId=
        const res = await fetch(`${API_BASE}/episode/sources?animeEpisodeId=${epId}`);
        const data = await res.json();

        if (!data.sources || data.sources.length === 0) {
            throw new Error("Source not found on this endpoint.");
        }

        const m3u8 = data.sources[0].url;
        const finalLink = `${PROXY_URL}?url=${encodeURIComponent(m3u8)}`;

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(finalLink);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
            video.src = finalLink;
            video.play();
        }
        status.innerText = "🎬 Now Playing";
    } catch (e) {
        status.innerText = "❌ Fail: Try a different Anime/ID.";
        console.error(e);
    }
}
</script>
</body>
</html>
